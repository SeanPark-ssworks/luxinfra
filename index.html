<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Export Product Manager | 수출 제품 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:#1e3a5f; --accent:#f97316; --bg:#f0f4f8;
  --text:#1a202c; --muted:#718096; --border:#e2e8f0;
  --green:#16a34a; --green-bg:#f0fdf4; --green-bd:#86efac;
  --blue:#2563eb;  --blue-bg:#eff6ff;  --blue-bd:#93c5fd;
  --red:#dc2626;   --amber:#d97706;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif;
       background:var(--bg); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
.header { background:var(--primary); color:white; padding:14px 24px;
          display:flex; align-items:center; justify-content:space-between;
          position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.25); }
.hdr-title h1 { font-size:18px; font-weight:700; }
.hdr-title p  { font-size:11px; opacity:.65; margin-top:2px; }
.hdr-right    { display:flex; gap:8px; align-items:center; }
.lang-toggle  { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
                border-radius:20px; padding:3px; display:flex; }
.lang-btn { background:transparent; border:none; color:rgba(255,255,255,.65);
            padding:3px 10px; border-radius:16px; cursor:pointer;
            font-size:11px; font-weight:700; transition:all .15s; }
.lang-btn.on  { background:white; color:var(--primary); }
.admin-btn    { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25);
                color:white; padding:5px 14px; border-radius:6px; cursor:pointer;
                font-size:12px; font-weight:600; transition:all .15s; }
.admin-btn.on { background:#f97316; border-color:#f97316; }
.export-btn   { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25);
                color:white; padding:5px 14px; border-radius:6px; cursor:pointer;
                font-size:12px; font-weight:600; transition:all .15s; }
.export-btn:hover { background:rgba(255,255,255,.25); }

/* ── STATS BAR ── */
.stats-bar { background:white; border-bottom:1px solid var(--border);
             padding:10px 24px; display:flex; gap:28px; overflow-x:auto; }
.stat   { display:flex; flex-direction:column; flex-shrink:0; }
.stat-n { font-size:22px; font-weight:800; color:var(--primary); line-height:1; }
.stat-l { font-size:10px; color:var(--muted); margin-top:2px;
          text-transform:uppercase; letter-spacing:.5px; }

/* ── FILTER BAR ── */
.filter-bar { background:white; border-bottom:1px solid var(--border);
              padding:10px 24px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.cat-tabs   { display:flex; flex-wrap:wrap; gap:5px; }
.ct { border:1.5px solid; background:white; padding:4px 13px; border-radius:20px;
      cursor:pointer; font-size:12px; font-weight:600; transition:all .15s; white-space:nowrap; }
.ct[data-c="all"]                { border-color:var(--primary); color:var(--primary); }
.ct[data-c="all"].on             { background:var(--primary); color:white; }
.ct[data-c="solar_street_light"] { border-color:#f59e0b; color:#d97706; }
.ct[data-c="solar_street_light"].on { background:#f59e0b; color:white; }
.ct[data-c="solar_water_pump"]   { border-color:#3b82f6; color:#2563eb; }
.ct[data-c="solar_water_pump"].on   { background:#3b82f6; color:white; }
.ct[data-c="bidet"]              { border-color:#10b981; color:#059669; }
.ct[data-c="bidet"].on           { background:#10b981; color:white; }
.ct[data-c="road_marker"]        { border-color:#ef4444; color:#dc2626; }
.ct[data-c="road_marker"].on     { background:#ef4444; color:white; }
.f-select { padding:5px 11px; border:1.5px solid var(--border); border-radius:6px;
            font-size:12px; background:white; cursor:pointer; outline:none; }
.f-select:focus { border-color:var(--primary); }
.f-search { padding:5px 11px; border:1.5px solid var(--border); border-radius:6px;
            font-size:12px; outline:none; width:170px; }
.f-search:focus { border-color:var(--primary); }

/* ── MAIN / GRID ── */
.main { padding:20px 24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }

/* ── PRODUCT CARD ── */
.card { background:white; border-radius:10px; border:1px solid var(--border);
        display:flex; flex-direction:column; transition:all .2s; }
.card:hover { box-shadow:0 4px 20px rgba(0,0,0,.12); transform:translateY(-2px); }

/* image area */
.c-img { position:relative; height:140px; overflow:hidden;
         border-radius:10px 10px 0 0; background:#f8fafc; }
.c-img > img { width:100%; height:100%; object-fit:contain; padding:8px; }
.c-img-ph   { width:100%; height:100%; display:flex; flex-direction:column;
              align-items:center; justify-content:center; color:#cbd5e1; gap:6px; }
.c-img-ph .ph-ico { font-size:36px; }
.c-img-ph .ph-txt { font-size:11px; }
.c-img-gallery { display:flex; width:100%; height:100%; }
.c-img-gallery img { flex:1; min-width:0; height:100%; object-fit:contain; padding:4px; }
.c-img-badge { position:absolute; top:8px; right:8px; }
.c-img-flag  { position:absolute; top:8px; left:8px; font-size:18px; }

/* card head */
.c-head  { padding:8px 12px 6px; border-bottom:1px solid var(--border); }
.c-model { font-size:16px; font-weight:800; color:var(--primary); }
.c-sup   { font-size:11px; color:var(--muted); margin-top:2px; }

/* category badge */
.cbadge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; }
.cbadge.solar_street_light { background:#fef3c7; color:#d97706; }
.cbadge.solar_water_pump   { background:#dbeafe; color:#2563eb; }
.cbadge.bidet              { background:#d1fae5; color:#059669; }
.cbadge.road_marker        { background:#fee2e2; color:#dc2626; }

/* card body */
.c-body { padding:7px 10px; flex:1; }

/* ── SPEC GRID (card) ── */
.spec-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-bottom:6px; }
.spec-item { display:flex; align-items:flex-start; gap:5px; padding:4px 5px;
             background:#f8fafc; border-radius:5px; border:1px solid var(--border); }
.spec-ico  { font-size:13px; flex-shrink:0; }
.spec-txt  { min-width:0; }
.spec-lbl  { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.spec-val  { font-size:11px; font-weight:600; color:var(--text); margin-top:1px;
             overflow:hidden; display:-webkit-box; -webkit-line-clamp:2;
             -webkit-box-orient:vertical; white-space:normal; }

/* ── PRICE 3-COL (card) ── */
.price-3col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; margin-bottom:4px; }
.p3-block   { border:1px solid var(--border); border-radius:6px; padding:5px 4px; text-align:center; }
.p3-block.purchase { border-color:var(--blue-bd); background:var(--blue-bg); }
.p3-block.export   { border-color:var(--green-bd); background:var(--green-bg); }
.p3-title { font-size:9px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); }
.p3-val   { font-size:15px; font-weight:800; color:var(--text); margin-top:2px; }
.p3-val.filled { }
.p3-block.purchase .p3-val.filled { color:var(--blue); }
.p3-block.export   .p3-val.filled { color:var(--green); }
.p3-val.empty-val { color:#cbd5e1; font-size:12px; font-weight:400; }
.p3-note  { font-size:9px; color:var(--muted); margin-top:1px; }

/* ── COMPACT TIER PRICES ── */
.tier-label { font-size:9px; font-weight:700; text-transform:uppercase;
              letter-spacing:.6px; color:var(--muted); margin-bottom:5px; }
.tier-grid  { display:grid; grid-template-columns:repeat(3,1fr); gap:4px;
              margin-bottom:10px; }
.tier-item  { background:#f8fafc; border:1px solid var(--border); border-radius:6px;
              padding:5px 4px; text-align:center; }
.tier-item.best { border-color:#fca5a5; background:#fff5f5; }
.tier-price { font-size:14px; font-weight:800; color:var(--text); line-height:1.1; }
.tier-item.best .tier-price { color:var(--red); }
.tier-qty   { font-size:9px; color:var(--muted); margin-top:2px; line-height:1.2; }

/* ── BIZ PRICES (실구매가 / 수출가 / 마진) ── */
.biz-section { border:1px solid var(--border); border-radius:7px;
               overflow:hidden; margin-bottom:8px; }
.biz-row { display:flex; justify-content:space-between; align-items:center;
           padding:6px 10px; font-size:12px; border-bottom:1px solid var(--border); }
.biz-row:last-child { border-bottom:none; }
.biz-row.margin-row { background:#f0fdf4; }
.biz-row.empty-row  { background:#fafafa; }
.biz-lbl { color:var(--muted); font-size:11px; display:flex; align-items:center; gap:4px; }
.biz-val { font-weight:700; color:var(--text); }
.biz-val.purchase { color:#1d4ed8; }
.biz-val.export   { color:var(--green); }
.biz-val.margin   { color:#059669; }
.biz-val.margin-neg { color:#dc2626; }
.biz-empty { color:#cbd5e1; font-size:11px; font-style:italic; }

/* ── THUMB STAR BUTTON ── */
.img-btn.thumb-on  { background:#fef3c7; color:#d97706; border:1px solid #fbbf24; }
.img-btn.thumb-off { background:#f8fafc; color:#94a3b8; border:1px solid var(--border); }

/* ── HIDDEN PRODUCT ── */
.card.hidden-product { opacity:.42; }
.card.hidden-product .c-img::after {
  content:'🚫 숨김';
  position:absolute; inset:0;
  background:rgba(0,0,0,.38);
  display:flex; align-items:center; justify-content:center;
  color:white; font-size:14px; font-weight:800; letter-spacing:1px;
  border-radius:10px 10px 0 0;
}
.ae-hide-btn { width:100%; padding:7px 0; border-radius:6px; font-size:12px;
               font-weight:700; cursor:pointer; border:none; transition:all .15s; }
.ae-hide-btn.do-hide { background:#fee2e2; color:#dc2626; }
.ae-hide-btn.do-show { background:#d1fae5; color:#059669; }
.ae-hide-btn:hover   { opacity:.82; }

/* hidden-toggle in filter bar (admin only) */
.hidden-toggle-btn {
  display:none;
  background:#fee2e2; border:1px solid #fca5a5; color:#dc2626;
  padding:4px 13px; border-radius:20px; cursor:pointer;
  font-size:12px; font-weight:600; transition:all .15s; white-space:nowrap;
}
.hidden-toggle-btn.active { background:#dc2626; color:white; border-color:#dc2626; }
body.admin-on .hidden-toggle-btn { display:inline-flex; }

/* hidden stat (admin only) */
#stat-hidden { display:none; }
body.admin-on #stat-hidden { display:flex; }

/* note */
.note-bar { padding:5px 10px; background:#fffbeb; border-radius:6px;
            border:1px dashed #fbbf24; font-size:11px; color:#92400e; margin-bottom:6px; }

/* ── ADMIN EDITOR (in card) ── */
.admin-editor { display:none; margin-top:8px; padding:10px 12px;
                background:var(--blue-bg); border-radius:7px; border:1px solid var(--blue-bd); }
body.admin-on .admin-editor { display:block; }
.ae-title { font-size:11px; font-weight:800; color:#1d4ed8; margin-bottom:10px; }
.ae-group { margin-bottom:8px; }
.ae-group-title { font-size:9px; font-weight:700; text-transform:uppercase;
                  letter-spacing:.6px; color:#64748b; margin-bottom:5px; }
.ae-row   { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.ae-lbl   { font-size:11px; color:#64748b; width:96px; flex-shrink:0; }
.ae-sym   { font-size:12px; color:var(--muted); }
.ae-in    { border:1.5px solid var(--blue-bd); border-radius:4px; padding:4px 7px;
            font-size:12px; width:100px; outline:none; background:white; }
.ae-in.wide  { width:200px; }
.ae-in.green { border-color:var(--green-bd); }
.ae-in.amber { border-color:#fbbf24; }
.ae-in:focus { border-color:var(--primary); }

/* image upload area */
.img-upload-area { border:2px dashed #93c5fd; border-radius:8px; padding:10px;
                   background:white; margin-bottom:6px; }
.img-item-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.img-item-row .img-preview { flex:1; margin-bottom:0; }
.img-preview { width:100%; height:100px; object-fit:contain; border-radius:6px;
               background:#f8fafc; margin-bottom:6px; display:block; }
.img-btns    { display:flex; gap:6px; flex-wrap:wrap; }
.img-btn     { padding:5px 12px; border-radius:6px; font-size:11px; font-weight:700;
               cursor:pointer; border:none; transition:all .15s; }
.img-btn.upload { background:var(--primary); color:white; }
.img-btn.clear  { background:#fee2e2; color:#dc2626; }
.img-btn:hover  { opacity:.85; }
.img-url-row    { display:flex; align-items:center; gap:6px; margin-top:6px; }
.img-url-lbl    { font-size:10px; color:var(--muted); white-space:nowrap; }
.img-file-in    { display:none; }

/* pdf catalog button */
.cat-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 13px;
           background:#fef3c7; border:1px solid #fbbf24; border-radius:6px;
           color:#92400e; font-size:12px; font-weight:700; cursor:pointer;
           text-decoration:none; transition:all .15s; margin-bottom:6px; }
.cat-btn:hover { background:#fde68a; }
.cat-btn-del   { background:#fee2e2; border-color:#fca5a5; color:#dc2626; }
.cat-btn-del:hover { background:#fecaca; }

/* card footer */
.c-foot { padding:6px 12px; border-top:1px solid var(--border);
          display:flex; justify-content:space-between; align-items:center; }
.c-date     { font-size:11px; color:var(--muted); }
.detail-btn { font-size:12px; color:var(--primary); font-weight:700; background:none;
              border:none; cursor:pointer; padding:3px 8px; border-radius:4px; transition:.15s; }
.detail-btn:hover { background:#e8f0fe; }

/* ── EMPTY STATE ── */
.empty     { text-align:center; padding:60px 20px; color:var(--muted); }
.empty .ico{ font-size:48px; margin-bottom:12px; }
.empty h3  { font-size:17px; color:var(--text); margin-bottom:6px; }

/* ── DETAIL MODAL ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
           z-index:200; align-items:center; justify-content:center; padding:20px; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:12px; max-width:700px; width:100%;
         max-height:90vh; overflow-y:auto; }
.m-head { padding:18px 22px 14px; border-bottom:1px solid var(--border);
          display:flex; justify-content:space-between; align-items:flex-start;
          position:sticky; top:0; background:white; z-index:10; }
.m-close { background:none; border:none; font-size:26px; cursor:pointer;
           color:var(--muted); line-height:1; }
.m-body  { padding:18px 22px; }
.m-sec   { margin-bottom:20px; }
.m-sec-title { font-size:10px; font-weight:800; text-transform:uppercase;
               letter-spacing:1px; color:var(--muted); padding-bottom:6px;
               border-bottom:1px solid var(--border); margin-bottom:10px; }
.sg  { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.sr  { display:flex; flex-direction:column; padding:6px 10px;
       background:#f8fafc; border-radius:6px; }
.sr .sl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.sr .sv { font-size:13px; font-weight:600; color:var(--text); margin-top:2px; }
.sr.full{ grid-column:1/-1; }

/* modal image */
.m-img { width:100%; max-height:260px; object-fit:contain; border-radius:8px;
         background:#f8fafc; border:1px solid var(--border); margin-bottom:16px; padding:8px; }
.m-img-gallery { display:flex; gap:6px; margin-bottom:16px; }
.m-img-multi { flex:1; min-width:0; max-height:240px; object-fit:contain; border-radius:8px;
               background:#f8fafc; border:1px solid var(--border); padding:6px; }
.m-img-ph { width:100%; height:160px; background:#f8fafc; border:1px solid var(--border);
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            color:#cbd5e1; font-size:48px; margin-bottom:16px; }

/* ── CUSTOMS / CALC (modal) ── */
.customs-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px; }
.ci-row  { display:flex; flex-direction:column; padding:6px 10px;
           background:#f8fafc; border-radius:6px; }
.ci-lbl  { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.ci-val  { font-size:13px; font-weight:600; color:var(--text); margin-top:2px; }
.ci-in   { border:1.5px solid var(--border); border-radius:4px; padding:4px 7px;
           font-size:12px; outline:none; background:white; width:100%; margin-top:3px; }
.ci-in:focus { border-color:var(--primary); }
.customs-total { font-size:12px; font-weight:700; color:var(--primary);
                 padding:7px 12px; background:#f0f4f8; border-radius:6px;
                 margin-top:4px; text-align:right; }

/* ── PROFIT CALC BOX (modal) ── */
.calc-box     { background:linear-gradient(135deg,#f0f9ff,#e0f2fe);
                border:1px solid #93c5fd; border-radius:10px; padding:14px; }
.calc-box.has-loss { background:linear-gradient(135deg,#fff5f5,#fee2e2);
                     border-color:#fca5a5; }
.calc-title   { font-size:11px; font-weight:800; text-transform:uppercase;
                letter-spacing:.6px; color:#1e40af; margin-bottom:10px; }
.calc-title.loss { color:#dc2626; }
.calc-row-in  { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.calc-lbl     { font-size:12px; color:#475569; width:130px; flex-shrink:0; }
.calc-in      { border:1.5px solid #93c5fd; border-radius:4px; padding:5px 8px;
                font-size:13px; width:120px; outline:none; background:white;
                font-weight:600; }
.calc-in:focus { border-color:var(--primary); }
.calc-btns    { display:flex; gap:6px; margin:8px 0; }
.calc-btn     { padding:7px 16px; background:var(--primary); color:white; border:none;
                border-radius:6px; cursor:pointer; font-size:12px; font-weight:700; }
.calc-save-btn{ padding:7px 16px; background:#16a34a; color:white; border:none;
                border-radius:6px; cursor:pointer; font-size:12px; font-weight:700; }
.calc-results { border-top:1px solid #93c5fd; padding-top:10px; margin-top:8px; }
.calc-row     { display:flex; justify-content:space-between; padding:5px 8px;
                font-size:13px; border-radius:4px; }
.calc-row:nth-child(odd) { background:rgba(255,255,255,.5); }
.calc-key     { color:#475569; }
.calc-num     { font-weight:700; }
.calc-row.total-row   { background:#dbeafe; font-size:14px; border-radius:5px; margin:2px 0; }
.calc-row.profit-pos  .calc-num { color:#059669; font-size:15px; }
.calc-row.profit-neg  .calc-num { color:#dc2626; font-size:15px; }
.calc-row.profit-neg  { background:#fee2e2; border-radius:5px; }
.calc-rate            { font-size:11px; color:var(--muted); margin-left:4px; }
.calc-warning { background:#fee2e2; border:1px solid #fca5a5; border-radius:6px;
                padding:8px 12px; font-size:12px; color:#dc2626; font-weight:600;
                margin:6px 0; }
.calc-datetime{ font-size:10px; color:var(--muted); margin-top:6px; text-align:right; }
.calc-memo    { width:100%; border:1.5px solid #93c5fd; border-radius:4px;
                padding:6px 8px; font-size:12px; outline:none; resize:vertical;
                min-height:60px; font-family:inherit; margin-top:8px; background:white; }
.calc-memo:focus { border-color:var(--primary); }

/* modal price table */
.fptable { border:1px solid var(--border); border-radius:7px; overflow:hidden; }
.fp-head { display:grid; grid-template-columns:1fr 1fr 1fr;
           background:var(--primary); color:white; font-size:10px;
           font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.fp-head div,.fp-row div { padding:7px 12px; }
.fp-row { display:grid; grid-template-columns:1fr 1fr 1fr;
          border-top:1px solid var(--border); font-size:13px; }
.fp-row .ftype { font-size:10px; color:var(--muted); }
.fp-row .fprc  { font-weight:700; text-align:right; }
.fp-row .fprc.best { color:var(--red); }
.fp-biz { border-top:2px solid var(--border); background:#f8fafc; }
.fp-biz.purchase .fprc { color:#1d4ed8; font-size:14px; }
.fp-biz.export   .fprc { color:var(--green); font-size:14px; }
.fp-biz.profit   .fprc { color:#059669; font-size:14px; }
.fp-biz.profit-neg .fprc { color:var(--red); }

/* cost breakdown table in modal */
.cost-table { border:1px solid var(--border); border-radius:7px; overflow:hidden; }
.cth { display:grid; grid-template-columns:1fr 1fr 1fr;
       background:#f8fafc; font-size:10px; font-weight:700; color:var(--muted);
       text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.cth div,.ctr div { padding:6px 12px; }
.ctr { display:grid; grid-template-columns:1fr 1fr 1fr;
       border-top:1px solid var(--border); font-size:12px; }

.pb { flex:1; padding:8px; border-radius:6px; cursor:pointer;

.pb.ok { background:var(--primary); color:white; }
.pb.cc { background:white; color:var(--text); border:1px solid var(--border); }

/* ── PDF VIEWER MODAL ── */
.pdf-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
               z-index:400; flex-direction:column; align-items:center; justify-content:center;
               padding:16px; }
.pdf-overlay.open { display:flex; }
.pdf-modal  { background:white; border-radius:10px; width:100%; max-width:900px;

.pdf-header { padding:10px 16px; background:var(--primary); color:white;

.pdf-title  { font-size:14px; font-weight:700; }

// ── localStorage (관리자 입력값만 저장) ──
function load(){
  try{
    // 구버전(ep_v3) 데이터 마이그레이션
    const old = JSON.parse(localStorage.getItem('ep_v3'));
    if(old && old.products && !localStorage.getItem('ep_v3_admin')){
      const m = {};
      old.products.forEach(p => {
        m[p.id] = {
          purchasePrice: p.purchasePrice,
          exportPrice:   p.exportPrice,
          images:        p.image ? [p.image] : (p.images||[]),
          thumbnailIdx:  0,
          catalog:       p.catalog,
          marginNote:    p.marginNote,
          customs:       {},
          calc:          {}
        };
      });
      localStorage.setItem('ep_v3_admin', JSON.stringify(m));
    }

    const d = JSON.parse(localStorage.getItem('ep_v3_admin'));
    if(!d) return;
    // 제품 목록은 코드 기준, 관리자 입력값만 덮어씀
    products.forEach(p => {
      if(d[p.id]){
        const a = d[p.id];
        if(a.purchasePrice !== undefined) p.purchasePrice = a.purchasePrice;
        if(a.exportPrice   !== undefined) p.exportPrice   = a.exportPrice;
        if(a.costs         !== undefined) p.costs         = a.costs;
        if(a.marginNote    !== undefined) p.marginNote    = a.marginNote;
        if(a.catalog       !== undefined) p.catalog       = a.catalog;
        if(a.images        && a.images.length) p.images        = a.images;
        if(a.thumbnailIdx  !== undefined) p.thumbnailIdx  = a.thumbnailIdx;
        if(a.customs       !== undefined) p.customs       = a.customs;
        if(a.calc          !== undefined) p.calc          = a.calc;
        if(a.hidden        !== undefined) p.hidden        = a.hidden;
      }
    });
  }catch(e){}
}
function save(){
  const d = {};
  products.forEach(p => {
    d[p.id] = {
      purchasePrice: p.purchasePrice,
      exportPrice:   p.exportPrice,
      images:        p.images||[],
      thumbnailIdx:  p.thumbnailIdx||0,
      catalog:       p.catalog,
      marginNote:    p.marginNote,
      customs:       p.customs||{},
      calc:          p.calc||{},
      hidden:        p.hidden||false
    };
  });
  localStorage.setItem('ep_v3_admin', JSON.stringify(d));
}

  return products.filter(p=>{
    if(p.hidden && !(isAdmin && showHidden)) return false;
    if(curCat!=='all' && p.category!==curCat) return false;

    const q=curSearch;
    if(q && !p.model.toLowerCase().includes(q) &&
       !p.nameKo.includes(q) && !p.nameEn.toLowerCase().includes(q)) return false;
    return true;
  });
}

// HELPERS
// ═══════════════════════════════════════
function getSup(id){ return suppliers.find(s=>s.id===id)||{}; }
function fmt(v){ return v!==null && v!==undefined && v!=='' ? '$'+parseFloat(v).toFixed(2) : null; }
function totalCosts(p){
  const c = p.costs||{};
  const vals = [c.freight,c.insurance,c.duty,c.clearance,c.other].map(x=>parseFloat(x)||0);
  return vals.reduce((a,b)=>a+b,0);
}
function calcMargin(p){
  if(!p.purchasePrice || !p.exportPrice) return null;
  const tc = totalCosts(p);
  const margin = parseFloat(p.exportPrice) - parseFloat(p.purchasePrice) - tc;
  const pct = (margin / parseFloat(p.exportPrice) * 100).toFixed(1);
  return { amount: margin, pct };
}

}

// ═══════════════════════════════════════
// SPEC EXTRACTION HELPER
// ═══════════════════════════════════════
function getCardSpec(p, type){
  if(!p.specs) return null;
  const s = p.specs;
  const keys = Object.keys(s);
  function find(...pats){
    for(const pat of pats){
      const k = keys.find(k=>k.toLowerCase().includes(pat.toLowerCase()));
      if(k && s[k]) return s[k];
    }
    return null;
  }
  switch(type){
    case 'lm':{
      const v = find('Luminous Flux','Flux','Lumen','Lumens','lm/');
      if(v){ const m=v.match(/([\d,]+)\s*(LM|lm|lumens)/i); return m?m[1]+' LM':v; }
      const led = find('LED ');
      if(led){ const m=led.match(/([\d,]+)\s*(lm|lumens)/i); if(m) return m[1]+' LM'; }
      return null;
    }
    case 'battery':{
      const v = find('Battery');
      if(!v) return null;
      if(v.length<=28) return v;
      const cap = v.match(/([\d,.]+\s*(?:kWh|Wh|mAh|Ah))/i);
      return cap ? cap[1] : v.substring(0,28)+'…';
    }
    case 'panel':{
      const v = find('Solar Panel');
      if(!v) return null;
      if(v.length<=28) return v;
      const wv = v.match(/(\d+V\s*\/\s*\d+W)/); if(wv) return wv[1];
      const w = v.match(/(\d+W)/); return w?w[1]:v.substring(0,28)+'…';
    }
    case 'ip': return find('IP Grade','IP Rating','IP');
    case 'height': return find('Install Height','Suggested Pole Height','Pole Height','Height');
    case 'backup':{
      const v = find('Backup Time','Backup');
      if(v) return v;
      if(p.workingMode){
        const m = p.workingMode.match(/(\d+[-–]\d+\s*(?:rainy\s*)?days?(?:\s+backup)?)/i);
        if(m) return m[1];
      }
      return null;
    }
  }
  return null;
}

    { ico:'💧', key:'ip',      lbl:'IP' },
    { ico:'📏', key:'height',  lbl:lang==='ko'?'설치 높이':'Height' },
    { ico:'☁️', key:'backup',  lbl:lang==='ko'?'백업':'Backup' }
  ];
  const specItems = specDefs.map(d=>{

    return `<div class="spec-item"><span class="spec-ico">${d.ico}</span><div class="spec-txt"><div class="spec-lbl">${d.lbl}</div><div class="spec-val">${v}</div></div></div>`;
  }).filter(Boolean).join('');
  const specGrid = specItems ? `<div class="spec-grid">${specItems}</div>` : '';

  // 3-section price
  const bestQ = p.prices && p.prices.length ? p.prices[p.prices.length-1] : null;

    </div>
    <div class="p3-block purchase">
      <div class="p3-title">${lang==='ko'?'실구매가':'Purchase'}</div>
      <div class="p3-val ${p.purchasePrice?'filled':''}">${p.purchasePrice?'$'+parseFloat(p.purchasePrice).toFixed(0):'—'}</div>
    </div>
    <div class="p3-block export">
      <div class="p3-title">${lang==='ko'?'수출가':'Export'}</div>
      <div class="p3-val ${p.exportPrice?'filled':''}">${p.exportPrice?'$'+parseFloat(p.exportPrice).toFixed(0):'—'}</div>
    </div>

  const imgAdminRows = imgs.map((src,i)=>`<div class="img-item-row">

        <button class="img-btn clear" onclick="removeImg('${p.id}',${i})">✕</button>
      </div></div>`).join('');
  const adminBlock = `<div class="admin-editor"><div class="ae-title">✏️ ${t('adminEdit')}</div>

      <div class="img-upload-area">${imgAdminRows}
        ${imgs.length<5?`<div class="img-btns"><button class="img-btn upload" onclick="document.getElementById('fileIn_${p.id}').click()">📁 ${lang==='ko'?'사진 추가':'Add Photo'}</button></div>
        <input class="img-file-in" type="file" id="fileIn_${p.id}" accept="image/*" onchange="handleImgFile('${p.id}',this)">
        <div class="img-url-row"><span class="img-url-lbl">URL</span><input class="ae-in wide" type="text" placeholder="https://..." onchange="addImg('${p.id}',this.value);this.value=''"></div>`
        :`<div style="font-size:11px;color:var(--muted)">${lang==='ko'?'최대 5장':'Max 5 images'}</div>`}
      </div></div>
    <div class="ae-group"><div class="ae-group-title">${t('aeQuoted')}</div>
      ${p.prices.map((r,i)=>`<div class="ae-row"><span class="ae-lbl">${r.qty}</span><span class="ae-sym">$</span>
        <input class="ae-in" type="number" step="0.01" inputmode="decimal" value="${r.usd}" onchange="setPrc('${p.id}',${i},this.value)"></div>`).join('')}
    </div>
    <div class="ae-group"><div class="ae-group-title">${t('aeBiz')}</div>
      <div class="ae-row"><span class="ae-lbl">💼 ${t('purchasePrc')}</span><span class="ae-sym">$</span>
        <input class="ae-in green" type="number" step="0.01" inputmode="decimal" value="${p.purchasePrice||''}" placeholder="—" onchange="setPurchase('${p.id}',this.value)"></div>
      <div class="ae-row"><span class="ae-lbl">📤 ${t('exportPrc')}</span><span class="ae-sym">$</span>
        <input class="ae-in amber" type="number" step="0.01" inputmode="decimal" value="${p.exportPrice||''}" placeholder="—" onchange="setExport('${p.id}',this.value)"></div>
    </div>
    <div class="ae-group"><div class="ae-group-title">📝 ${t('note')}</div>
      <div class="ae-row"><input class="ae-in wide" type="text" value="${p.marginNote||''}"

    </div>
    <div class="ae-group">
      <button class="ae-hide-btn ${p.hidden?'do-show':'do-hide'}"

      </div>

  return `<div class="card${p.hidden?' hidden-product':''}" id="card-${p.id}">
    ${imgBlock}
    <div class="c-head">
      <div class="c-model">${p.model}</div>

      <div class="c-sup">${sup.name||''}</div>

    <div class="c-body">

      <div style="display:flex;gap:6px;align-items:center">

function renderAll(){
  updateStats();
  const list = filtered();
  const grid = document.getElementById('grid');
  const emp  = document.getElementById('emptyState');
  if(!list.length){ grid.style.display='none'; emp.style.display='block'; return; }
  grid.style.display='grid'; emp.style.display='none';
  grid.innerHTML = list.map(cardHTML).join('');
}

// ═══════════════════════════════════════
// ADMIN MUTATIONS
// ═══════════════════════════════════════
function getP(id){ return products.find(x=>x.id===id); }
function setPrc(id,i,v){    const p=getP(id); if(p){ p.prices[i].usd=parseFloat(v)||0; save(); } }
function setPurchase(id,v){ const p=getP(id); if(p){ p.purchasePrice=v?parseFloat(v):null; save(); renderAll(); } }
function setExport(id,v){   const p=getP(id); if(p){ p.exportPrice=v?parseFloat(v):null; save(); renderAll(); } }
function setCost(id,k,v){   const p=getP(id); if(p){ if(!p.costs)p.costs={}; p.costs[k]=v?parseFloat(v):null; save(); renderAll(); } }
function setNote(id,v){     const p=getP(id); if(p){ p.marginNote=v; save(); renderAll(); } }
function setThumbnail(id,i){ const p=getP(id); if(p){ p.thumbnailIdx=i; save(); renderAll(); } }
function setHidden(id,v){ const p=getP(id); if(!p) return; p.hidden=v; save(); renderAll(); }
function addImg(id,v){
  const p=getP(id); if(p&&v){ if(!p.images)p.images=[]; if(p.images.length<5){p.images.push(v);} save(); renderAll(); }
}
function removeImg(id,i){
  const p=getP(id); if(p&&p.images){
    p.images.splice(i,1);
    if((p.thumbnailIdx||0)>=p.images.length) p.thumbnailIdx=0;
    save(); renderAll();
  }
}
function setCustoms(id,k,v){
  const p=getP(id); if(p){
    if(!p.customs)p.customs={};
    p.customs[k]=(k==='hsCode'||k==='incoterms')?v:(v?parseFloat(v):null);
    save();
  }
}
function runCalc(id){
  const p=getP(id); if(!p) return;
  const qtyEl=document.getElementById('calcQty_'+id);
  const memoEl=document.getElementById('calcMemo_'+id);
  if(!qtyEl) return;
  const qty=parseInt(qtyEl.value)||0;
  if(qty<=0){ alert(lang==='ko'?'수량을 입력해주세요':'Enter quantity'); return; }
  if(!p.purchasePrice){ alert(lang==='ko'?'실구매가를 입력해주세요':'Enter purchase price'); return; }
  const c=p.customs||{};
  const logisticsTotal=['freight','insurance','tariff','vat','customsFee','brokerFee','inland','storage','other']
    .reduce((s,k)=>s+(parseFloat(c[k])||0),0);
  const perUnit=qty>0?logisticsTotal/qty:0;
  const unitCostTotal=parseFloat(p.purchasePrice)+perUnit;
  const totalCostAll=unitCostTotal*qty;
  let totalRevenue=null,profit=null,profitRate=null;
  if(p.exportPrice){
    totalRevenue=parseFloat(p.exportPrice)*qty;
    profit=totalRevenue-totalCostAll;
    profitRate=totalRevenue>0?(profit/totalRevenue*100):null;
  }
  const now=new Date();
  const dt=now.toLocaleDateString('ko-KR')+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  if(!p.calc)p.calc={};
  p.calc.qty=qty; p.calc.totalCosts=logisticsTotal; p.calc.unitCostTotal=unitCostTotal;
  p.calc.totalCostAll=totalCostAll; p.calc.totalRevenue=totalRevenue;
  p.calc.profit=profit; p.calc.profitRate=profitRate;
  p.calc.calcMemo=memoEl?memoEl.value:''; p.calc.datetime=dt;
  save(); openDetail(id);
}
function saveCalcMemo(id){
  const p=getP(id); if(!p) return;
  const memoEl=document.getElementById('calcMemo_'+id);
  if(memoEl&&p.calc)p.calc.calcMemo=memoEl.value;
  save();
}
function handlePdfFile(id, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 20 * 1024 * 1024){
    alert(lang==='ko'
      ? 'PDF 파일이 20MB를 초과합니다. 더 작은 파일을 사용해주세요.'
      : 'PDF exceeds 20MB. Please use a smaller file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){ setCatalog(id, e.target.result); };
  reader.readAsDataURL(file);
}
function setCatalog(id, v){
  const p = getP(id);
  if(p){ p.catalog = v; save(); renderAll(); }
}
let _currentPdfUrl = '';
function openCatalog(id){
  const p = getP(id);
  if(!p || !p.catalog) return;

  let url = '';
  if(p.catalog.startsWith('data:')){
    const arr  = p.catalog.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8 = new Uint8Array(n);
    while(n--) u8[n] = bstr.charCodeAt(n);
    url = URL.createObjectURL(new Blob([u8], { type: mime }));
  } else {
    url = p.catalog;
  }

  _currentPdfUrl = url;
  document.getElementById('pdfTitle').textContent =
    (lang==='ko' ? '카탈로그 — ' : 'Catalog — ') + p.model;
  document.getElementById('pdfFrame').src = url;
  document.getElementById('pdfOverlay').classList.add('open');
}
function closePdfModal(){
  document.getElementById('pdfOverlay').classList.remove('open');
  document.getElementById('pdfFrame').src = '';
}
function pdfNewTab(){
  if(_currentPdfUrl) window.open(_currentPdfUrl, '_blank');
}
function handleImgFile(id, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    addImg(id, e.target.result);  // base64 data URL
  };
  reader.readAsDataURL(file);
  input.value = '';  // reset so same file can be re-selected
}

  </div>`;

  // profit calculator
  const hasResults=cal.totalCostAll!=null;

  const calcSec=`<div class="m-sec">
    <div class="m-sec-title">${lang==='ko'?'수익 계산':'Profit Calculator'}</div>

      ${!p.exportPrice?`<div class="calc-warning">⚠️ ${lang==='ko'?'수출가를 먼저 입력해주세요':'Enter export price first'}</div>`:''}
      <div class="calc-row-in">
        <span class="calc-lbl">${lang==='ko'?'계산 수량':'Quantity'}</span>

      </div>
      <div class="calc-row-in">
        <span class="calc-lbl">${lang==='ko'?'실구매가 (개당)':'Purchase (ea)'}</span>

          <div class="sr"><span class="sl">${t('company')}</span><span class="sv">${sup.name||'—'}</span></div>
          <div class="sr"><span class="sl">${t('contact')}</span><span class="sv">${sup.contact||'—'}</span></div>
          <div class="sr"><span class="sl">${t('phone')}</span><span class="sv">${sup.phone||'—'}</span></div>
          <div class="sr"><span class="sl">${t('origin')}</span><span class="sv">${p.origin==='China'?'🇨🇳 China':'🇰🇷 Korea'}</span></div>
          ${sup.website?`<div class="sr full"><span class="sl">${t('website')}</span><span class="sv"><a href="${sup.website}" target="_blank" style="color:var(--primary)">${sup.website}</a></span></div>`:''}
        </div>
        ${p.catalog?`<div style="margin-top:8px"><button class="cat-btn" onclick="openCatalog('${p.id}')">📄 ${lang==='ko'?'카탈로그 열기':'Open Catalog'}</button></div>`:''}
      </div>

      <div class="m-sec">
        <div class="m-sec-title">${t('specTitle')}</div>
        ${p.workingMode?`<div style="font-size:12px;color:#475569;background:#f8fafc;padding:8px 10px;border-radius:6px;margin-bottom:8px">${p.workingMode}</div>`:''}
        <div class="sg">
          ${Object.entries(p.specs).map(([k,v])=>`<div class="sr"><span class="sl">${k}</span><span class="sv">${v}</span></div>`).join('')}
        </div>
      </div>

      ${Object.keys(p.dimensions||{}).length?`<div class="m-sec">
        <div class="m-sec-title">${t('dimTitle')}</div>
        <div class="sg">
          ${Object.entries(p.dimensions).map(([k,v])=>`<div class="sr"><span class="sl">${k}</span><span class="sv">${v}</span></div>`).join('')}
        </div>
      </div>`:''}

      <div class="m-sec">
        <div class="m-sec-title">${t('priceTitle')}</div>
        <div class="fptable">
          <div class="fp-head"><div>${t('qty')}</div><div>${lang==='ko'?'구분':'Type'}</div><div style="text-align:right">${t('unitPrc')}</div></div>
          ${p.prices.map((r,i)=>`<div class="fp-row">
            <div style="font-size:12px;color:var(--muted)">${r.qty}</div>
            <div class="ftype">${lang==='ko'?'견적가':'Quoted'}</div>
            <div class="fprc ${i===p.prices.length-1?'best':''}">$${r.usd.toFixed(2)}</div></div>`).join('')}
          ${p.purchasePrice?`<div class="fp-row fp-biz purchase"><div>—</div><div class="ftype">💼 ${t('purchasePrc')}</div><div class="fprc">$${parseFloat(p.purchasePrice).toFixed(2)}</div></div>`:''}
          ${p.exportPrice?`<div class="fp-row fp-biz export"><div>—</div><div class="ftype">📤 ${t('exportPrc')}</div><div class="fprc">$${parseFloat(p.exportPrice).toFixed(2)}</div></div>`:''}
        </div>
        ${p.marginNote?`<div class="note-modal"><strong>${t('note')}:</strong> ${p.marginNote}</div>`:''}
      </div>

      ${customsSec}
      ${calcSec}
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); }

// EXPORT SHARE
// ═══════════════════════════════════════
function exportShare(){
  const gridEl = document.getElementById('grid');
  const savedHTML = gridEl.innerHTML;
  gridEl.innerHTML = '';
  const src = document.documentElement.outerHTML;
  gridEl.innerHTML = savedHTML;

  const dataStr = JSON.stringify(products, null, 2);
  const exported = src.replace(
    /let products = \[[\s\S]*?\];(\s*\/\/ ═)/,
    `let products = ${dataStr};\n$1`
  );

  const blob = new Blob([exported], { type:'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const now  = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const filename = `product-catalog-${stamp}.html`;

  // iOS 감지 - 다운로드 대신 새 탭으로 열기
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if(isIOS){
    const newTab = window.open(url, '_blank');
    if(newTab){
      // 새 탭 열린 경우 안내 표시
      setTimeout(()=>{
        alert('화면 하단 공유버튼(↑) → "파일에 저장" → index.html 로 이름 변경 후 GitHub에 업로드하세요.');
        URL.revokeObjectURL(url);
      }, 500);
    } else {
      // 팝업 차단된 경우 링크 직접 제공
      const a = document.createElement('a');
      a.href = url; a.target = '_blank'; a.textContent = '파일 열기 (탭하세요)';
      a.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:white;padding:14px 24px;border-radius:10px;font-size:15px;font-weight:700;z-index:9999;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.3)';
      document.body.appendChild(a);
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 15000);
    }
  } else {
    // 데스크탑 - 일반 다운로드
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }
}
